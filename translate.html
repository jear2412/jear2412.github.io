<div id="google_translate_element" style="display:none;"></div>

<script type="text/javascript">
function googleTranslateElementInit() {
  new google.translate.TranslateElement({
    pageLanguage: 'en',
    includedLanguages: 'es',
    layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
    autoDisplay: false
  }, 'google_translate_element');
}
</script>

<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var btn = document.createElement('button');
  btn.innerText = '🌐 ES';
  btn.style.cssText = 'position:fixed; bottom:20px; right:20px; z-index:9999; padding:8px 14px; border-radius:20px; border:1px solid #ccc; background:#fff; cursor:pointer; font-size:13px;';
  document.body.appendChild(btn);

  btn.addEventListener('click', function() {
    tryTranslate(0);
  });

  function tryTranslate(attempts) {
    var select = document.querySelector('.goog-te-combo');
    if (select) {
      select.value = select.value === 'es' ? 'en' : 'es';
      select.dispatchEvent(new Event('change'));
      btn.innerText = btn.innerText === '🌐 ES' ? '🌐 EN' : '🌐 ES';
    } else if (attempts < 10) {
      setTimeout(function() { tryTranslate(attempts + 1); }, 500);
    }
  }
});
</script>
